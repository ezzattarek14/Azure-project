version: '3.8'

services:
  # Tier 1: Frontend SPA (Nginx)
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: azure-devops-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Tier 2: Backend API (Node.js/Express)
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: azure-devops-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=devops_db
      - DB_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Tier 3: Managed Database (Local PostgreSQL container simulating Azure Database for PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: azure-devops-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=devops_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devops_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge
    internal: true # Isolated internal network for Tier 3 database security

volumes:
  pgdata:
